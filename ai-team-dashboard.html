<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 开发团队 · 实时工作台</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #080810;
    --surface: #0f0f1a;
    --surface2: #161622;
    --border: #1e1e2e;
    --leader:   #f4c430;
    --coder:    #00d4ff;
    --reviewer: #34d399;
    --text: #dde1f0;
    --text-dim: #555570;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans SC',sans-serif; min-height:100vh; }
  body::before {
    content:''; position:fixed; inset:0;
    background: radial-gradient(ellipse 60% 40% at 20% 0%,rgba(244,196,48,0.04) 0%,transparent 60%),
                radial-gradient(ellipse 50% 30% at 80% 100%,rgba(52,211,153,0.04) 0%,transparent 60%);
    pointer-events:none; z-index:0;
  }
  body::after {
    content:''; position:fixed; inset:0;
    background-image: linear-gradient(rgba(0,212,255,0.02) 1px,transparent 1px),
                      linear-gradient(90deg,rgba(0,212,255,0.02) 1px,transparent 1px);
    background-size:48px 48px; pointer-events:none; z-index:0;
  }
  .wrap { max-width:1160px; margin:0 auto; padding:32px 20px; position:relative; z-index:1; }

  /* HEADER */
  header { display:flex; align-items:center; justify-content:space-between; padding-bottom:24px; margin-bottom:32px; border-bottom:1px solid var(--border); }
  .h-title { font-family:'Space Mono',monospace; font-size:18px; font-weight:700; letter-spacing:0.08em; }
  .h-title em { color:var(--leader); font-style:normal; }
  .h-sub { font-size:12px; color:var(--text-dim); margin-top:4px; font-weight:300; }
  .live-pill { display:flex; align-items:center; gap:8px; padding:6px 16px; border-radius:100px; background:rgba(244,196,48,0.08); border:1px solid rgba(244,196,48,0.2); font-family:'Space Mono',monospace; font-size:11px; color:var(--leader); letter-spacing:0.12em; }
  .live-dot { width:6px; height:6px; border-radius:50%; background:var(--leader); animation:blink 1.4s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* AGENT CARDS */
  .agents { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:20px; }
  .acard { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px 20px; position:relative; overflow:hidden; transition:border-color 0.3s; }
  .acard::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
  .acard.leader::before   { background:var(--leader); }
  .acard.coder::before    { background:var(--coder); }
  .acard.reviewer::before { background:var(--reviewer); }
  .acard.active { border-color:rgba(0,212,255,0.25); box-shadow:0 0 24px rgba(0,212,255,0.04); }
  .acard-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .aname { font-family:'Space Mono',monospace; font-size:12px; font-weight:700; letter-spacing:0.08em; }
  .acard.leader   .aname { color:var(--leader); }
  .acard.coder    .aname { color:var(--coder); }
  .acard.reviewer .aname { color:var(--reviewer); }
  .abadge { font-size:10px; padding:3px 10px; border-radius:100px; font-weight:500; }
  .b-idle    { background:rgba(85,85,112,0.15);  color:var(--text-dim); border:1px solid rgba(85,85,112,0.2); }
  .b-working { background:rgba(0,212,255,0.1);   color:var(--coder);    border:1px solid rgba(0,212,255,0.2); }
  .b-waiting { background:rgba(244,196,48,0.1);  color:var(--leader);   border:1px solid rgba(244,196,48,0.2); }
  .b-done    { background:rgba(52,211,153,0.1);  color:var(--reviewer); border:1px solid rgba(52,211,153,0.2); }
  .b-failed  { background:rgba(239,68,68,0.1);   color:#ef4444;         border:1px solid rgba(239,68,68,0.2); }
  .arole { font-size:11px; color:var(--text-dim); margin-bottom:10px; font-weight:300; }
  .acur  { font-size:12px; color:var(--text); line-height:1.6; min-height:36px; font-weight:300; }
  .afoot { display:flex; gap:18px; margin-top:14px; padding-top:12px; border-top:1px solid var(--border); }
  .astat-val   { font-family:'Space Mono',monospace; font-size:20px; font-weight:700; }
  .astat-label { font-size:9px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.1em; margin-top:1px; }

  /* MISSION */
  .mission { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:22px 24px; margin-bottom:20px; }
  .sec-label { font-family:'Space Mono',monospace; font-size:10px; color:var(--text-dim); letter-spacing:0.15em; text-transform:uppercase; margin-bottom:14px; }
  .m-title { font-size:17px; font-weight:500; margin-bottom:16px; }
  .prog-bar  { height:3px; background:var(--border); border-radius:2px; overflow:hidden; margin-bottom:7px; }
  .prog-fill { height:100%; border-radius:2px; background:linear-gradient(90deg,var(--leader),var(--coder)); transition:width 0.7s ease; }
  .prog-meta { display:flex; justify-content:space-between; font-size:10px; color:var(--text-dim); font-family:'Space Mono',monospace; }
  .steps-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:18px; }
  .step { display:flex; align-items:center; gap:6px; padding:5px 11px; border-radius:6px; font-size:11px; font-family:'Space Mono',monospace; border:1px solid var(--border); color:var(--text-dim); background:var(--surface2); }
  .step.running   { color:var(--coder);    border-color:rgba(0,212,255,0.3);  background:rgba(0,212,255,0.05); }
  .step.succeeded { color:var(--reviewer); border-color:rgba(52,211,153,0.3); background:rgba(52,211,153,0.05); }
  .step.failed    { color:#ef4444;         border-color:rgba(239,68,68,0.3);  background:rgba(239,68,68,0.05); }
  .step-dot { width:5px; height:5px; border-radius:50%; background:currentColor; }
  .step.running .step-dot { animation:blink 1s infinite; }

  /* TWO COL */
  .two-col { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .panel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px 20px; height:380px; display:flex; flex-direction:column; }
  .scroll-list { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }
  .scroll-list::-webkit-scrollbar { width:2px; }
  .scroll-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  /* MESSAGES */
  .msg { display:flex; gap:10px; animation:fadeUp 0.25s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .av { width:26px; height:26px; border-radius:6px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:'Space Mono',monospace; font-size:10px; font-weight:700; }
  .av.leader   { background:rgba(244,196,48,0.12); color:var(--leader); }
  .av.coder    { background:rgba(0,212,255,0.10);  color:var(--coder); }
  .av.reviewer { background:rgba(52,211,153,0.10); color:var(--reviewer); }
  .av.system   { background:rgba(85,85,112,0.15);  color:var(--text-dim); }
  .msg-inner { flex:1; }
  .msg-top   { display:flex; align-items:center; gap:8px; margin-bottom:3px; }
  .mname { font-family:'Space Mono',monospace; font-size:11px; font-weight:700; }
  .mname.leader   { color:var(--leader); }
  .mname.coder    { color:var(--coder); }
  .mname.reviewer { color:var(--reviewer); }
  .mname.system   { color:var(--text-dim); }
  .mtime { font-size:10px; color:var(--text-dim); font-family:'Space Mono',monospace; }
  .mtext { font-size:12px; color:var(--text); line-height:1.65; font-weight:300; }

  /* EVENTS */
  .ev { display:flex; align-items:flex-start; gap:9px; padding:7px 0; border-bottom:1px solid var(--border); animation:fadeUp 0.25s ease; }
  .ev:last-child { border-bottom:none; }
  .ev-dot { width:5px; height:5px; border-radius:50%; margin-top:5px; flex-shrink:0; }
  .ev-dot.approved  { background:var(--leader); }
  .ev-dot.running   { background:var(--coder); }
  .ev-dot.succeeded { background:var(--reviewer); }
  .ev-dot.failed    { background:#ef4444; }
  .ev-dot.default   { background:var(--text-dim); }
  .ev-text { font-size:11px; color:var(--text-dim); line-height:1.5; font-weight:300; flex:1; }
  .ev-text strong { color:var(--text); font-weight:500; }
  .ev-time { font-size:10px; color:var(--text-dim); font-family:'Space Mono',monospace; flex-shrink:0; }

  /* EMPTY */
  .empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text-dim); font-size:12px; gap:8px; font-weight:300; }
  .empty-ico { font-size:22px; opacity:0.35; }

  /* MODAL */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.88); display:flex; align-items:center; justify-content:center; z-index:100; backdrop-filter:blur(6px); }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:36px; width:460px; max-width:92vw; }
  .modal h2 { font-family:'Space Mono',monospace; font-size:15px; color:var(--text); margin-bottom:8px; }
  .modal p  { font-size:12px; color:var(--text-dim); margin-bottom:22px; line-height:1.65; font-weight:300; }
  .fg { margin-bottom:14px; }
  .fg label { display:block; font-size:10px; color:var(--text-dim); letter-spacing:0.12em; text-transform:uppercase; margin-bottom:5px; font-family:'Space Mono',monospace; }
  .fg input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:7px; padding:9px 13px; color:var(--text); font-size:12px; font-family:'Space Mono',monospace; outline:none; transition:border-color 0.2s; }
  .fg input:focus { border-color:var(--leader); }
  .btn-p { width:100%; background:var(--leader); color:#000; border:none; border-radius:7px; padding:11px; font-size:13px; font-weight:700; font-family:'Space Mono',monospace; cursor:pointer; margin-top:6px; letter-spacing:0.05em; transition:opacity 0.2s; }
  .btn-p:hover { opacity:0.85; }
  .btn-g { width:100%; background:transparent; color:var(--text-dim); border:1px solid var(--border); border-radius:7px; padding:9px; font-size:11px; font-family:'Space Mono',monospace; cursor:pointer; margin-top:8px; transition:color 0.2s,border-color 0.2s; }
  .btn-g:hover { color:var(--text); border-color:var(--text-dim); }

  @media(max-width:720px) { .agents{grid-template-columns:1fr} .two-col{grid-template-columns:1fr} }
</style>
</head>
<body>

<div class="overlay" id="modal">
  <div class="modal">
    <h2>连接 Supabase</h2>
    <p>输入你的 Supabase 项目信息，页面将实时显示 AI 团队的工作状态。密钥仅在你的浏览器本地使用。</p>
    <div class="fg"><label>Project URL</label><input id="iUrl" placeholder="https://xxxxx.supabase.co"></div>
    <div class="fg"><label>Anon Key</label><input id="iKey" placeholder="eyJhbGciOiJIUzI1NiIs..."></div>
    <button class="btn-p" onclick="connect()">连接并开始监控</button>
    <button class="btn-g" onclick="demo()">使用演示数据预览效果</button>
  </div>
</div>

<div class="wrap">
  <header>
    <div>
      <div class="h-title">AI DEV TEAM <em>//</em> LIVE</div>
      <div class="h-sub" id="hsub">AI 开发团队实时工作台</div>
    </div>
    <div class="live-pill"><div class="live-dot"></div><span id="llabel">LIVE</span></div>
  </header>

  <div class="agents">
    <div class="acard leader" id="card-leader">
      <div class="acard-top"><span class="aname">LEADER</span><span class="abadge b-idle" id="badge-leader">待机</span></div>
      <div class="arole">任务分配 · 进度协调 · 决策</div>
      <div class="acur" id="cur-leader">等待任务...</div>
      <div class="afoot"><div><div class="astat-val" id="cnt-leader">0</div><div class="astat-label">消息数</div></div></div>
    </div>
    <div class="acard coder" id="card-coder">
      <div class="acard-top"><span class="aname">CODER</span><span class="abadge b-idle" id="badge-coder">待机</span></div>
      <div class="arole">功能实现 · 代码编写 · 测试</div>
      <div class="acur" id="cur-coder">等待任务...</div>
      <div class="afoot"><div><div class="astat-val" id="cnt-coder">0</div><div class="astat-label">消息数</div></div></div>
    </div>
    <div class="acard reviewer" id="card-reviewer">
      <div class="acard-top"><span class="aname">REVIEWER</span><span class="abadge b-idle" id="badge-reviewer">待机</span></div>
      <div class="arole">代码审查 · 安全检查 · 质量</div>
      <div class="acur" id="cur-reviewer">等待任务...</div>
      <div class="afoot"><div><div class="astat-val" id="cnt-reviewer">0</div><div class="astat-label">消息数</div></div></div>
    </div>
  </div>

  <div class="mission">
    <div class="sec-label">当前任务</div>
    <div class="m-title" id="mTitle">暂无进行中的任务</div>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="prog-meta"><span id="progLabel">0 / 0 步骤完成</span><span id="progPct">0%</span></div>
    <div class="steps-row" id="stepsRow"></div>
  </div>

  <div class="two-col">
    <div class="panel">
      <div class="sec-label" style="margin-bottom:12px">Agent 实时对话</div>
      <div class="scroll-list" id="msgList">
        <div class="empty"><div class="empty-ico">💬</div><span>等待 Agent 发言...</span></div>
      </div>
    </div>
    <div class="panel">
      <div class="sec-label" style="margin-bottom:12px">系统事件日志</div>
      <div class="scroll-list" id="evList">
        <div class="empty"><div class="empty-ico">📋</div><span>等待事件...</span></div>
      </div>
    </div>
  </div>
</div>

<script>
const AGENTS = ['leader','coder','reviewer'];
const AV     = { leader:'LDR', coder:'COD', reviewer:'REV', system:'SYS' };
const ROLES  = { leader:'Leader', coder:'Coder', reviewer:'Reviewer', system:'System' };
const COUNTS = { leader:0, coder:0, reviewer:0 };
let sb = null;

async function connect() {
  const url = document.getElementById('iUrl').value.trim();
  const key = document.getElementById('iKey').value.trim();
  if (!url||!key) { alert('请填写完整信息'); return; }
  sb = supabase.createClient(url, key);
  document.getElementById('modal').style.display = 'none';
  document.getElementById('hsub').textContent = '已连接 · 实时监控中';
  await loadData();
  subscribe();
}

async function loadData() {
  const { data:missions } = await sb.from('dev_missions').select('*, dev_steps(*)')
    .eq('status','running').order('created_at',{ascending:false}).limit(1);
  if (missions?.length) renderMission(missions[0]);

  const { data:events } = await sb.from('dev_events').select('*')
    .order('created_at',{ascending:false}).limit(40);
  if (events) {
    events.filter(e=>e.event_type==='agent_message').reverse().forEach(addMsg);
    events.filter(e=>e.event_type!=='agent_message').reverse().forEach(addEv);
  }
}

function subscribe() {
  sb.channel('team-live')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'dev_events'},p=>{
      const e=p.new;
      if (e.event_type==='agent_message') addMsg(e); else addEv(e);
      syncAgent(e);
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'dev_steps'},()=>refreshMission())
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'dev_missions'},p=>renderMission(p.new))
    .subscribe();
}

async function refreshMission() {
  const { data } = await sb.from('dev_missions').select('*, dev_steps(*)')
    .eq('status','running').order('created_at',{ascending:false}).limit(1);
  if (data?.length) renderMission(data[0]);
}

function renderMission(m) {
  document.getElementById('mTitle').textContent = m.title||'未命名任务';
  const steps = m.dev_steps||[];
  const done  = steps.filter(s=>s.status==='succeeded').length;
  const total = steps.length;
  const pct   = total ? Math.round(done/total*100) : 0;
  document.getElementById('progFill').style.width  = pct+'%';
  document.getElementById('progLabel').textContent = `${done} / ${total} 步骤完成`;
  document.getElementById('progPct').textContent   = pct+'%';
  const row = document.getElementById('stepsRow');
  row.innerHTML = '';
  steps.forEach(s=>{
    const d = document.createElement('div');
    const st = ['running','succeeded','failed'].includes(s.status) ? s.status : '';
    d.className = 'step '+st;
    const lbl = {queued:'排队中',running:'执行中',succeeded:'已完成',failed:'失败'};
    d.innerHTML = `<div class="step-dot"></div>${s.step_kind} · ${lbl[s.status]||s.status}`;
    row.appendChild(d);
  });
  steps.forEach(s=>{
    const a = s.assigned_to;
    if (!AGENTS.includes(a)) return;
    const badge = document.getElementById('badge-'+a);
    const cur   = document.getElementById('cur-'+a);
    const card  = document.getElementById('card-'+a);
    if (s.status==='running') {
      badge.className='abadge b-working'; badge.textContent='工作中';
      cur.textContent = s.step_kind+' · 执行中...'; card.classList.add('active');
    } else if (s.status==='succeeded') {
      badge.className='abadge b-done'; badge.textContent='已完成';
      cur.textContent = s.step_kind+' · ✓ 完成'; card.classList.remove('active');
    }
  });
}

function addMsg(e) {
  const list = document.getElementById('msgList');
  list.querySelector('.empty')?.remove();
  const p     = e.payload||{};
  const agent = e.agent||'system';
  const time  = new Date(e.created_at).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  const el = document.createElement('div');
  el.className = 'msg';
  el.innerHTML = `
    <div class="av ${agent}">${AV[agent]||'???'}</div>
    <div class="msg-inner">
      <div class="msg-top">
        <span class="mname ${agent}">${ROLES[agent]||agent}</span>
        <span class="mtime">${time}</span>
      </div>
      <div class="mtext">${p.message||JSON.stringify(p)}</div>
    </div>`;
  list.appendChild(el);
  list.scrollTop = list.scrollHeight;
  if (AGENTS.includes(agent)) {
    COUNTS[agent]++;
    document.getElementById('cnt-'+agent).textContent = COUNTS[agent];
  }
}

function addEv(e) {
  const list = document.getElementById('evList');
  list.querySelector('.empty')?.remove();
  const time = new Date(e.created_at).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const map = {
    proposal_approved:{cls:'approved', label:'提案通过审批'},
    mission_started:  {cls:'running',  label:'任务开始'},
    step_completed:   {cls:'succeeded',label:'步骤完成'},
    mission_succeeded:{cls:'succeeded',label:'任务成功'},
    mission_failed:   {cls:'failed',   label:'任务失败'},
  };
  const meta = map[e.event_type]||{cls:'default',label:e.event_type};
  const el = document.createElement('div');
  el.className = 'ev';
  el.innerHTML = `
    <div class="ev-dot ${meta.cls}"></div>
    <div class="ev-text"><strong>${meta.label}</strong>${e.agent?' · '+e.agent:''}</div>
    <div class="ev-time">${time}</div>`;
  list.appendChild(el);
  list.scrollTop = list.scrollHeight;
}

function syncAgent(e) {
  const a = e.agent;
  if (!AGENTS.includes(a)) return;
  const p = e.payload||{};
  if (!p.status) return;
  const badge = document.getElementById('badge-'+a);
  const cur   = document.getElementById('cur-'+a);
  const card  = document.getElementById('card-'+a);
  const map = {
    working:['b-working','工作中',true],
    waiting:['b-waiting','等待中',false],
    idle:   ['b-idle',   '待机',  false],
    done:   ['b-done',   '已完成',false],
    failed: ['b-failed', '失败',  false],
  };
  const [cls,label,active] = map[p.status]||['b-idle',p.status,false];
  badge.className='abadge '+cls; badge.textContent=label;
  if (p.message) cur.textContent = p.message;
  active ? card.classList.add('active') : card.classList.remove('active');
}

function demo() {
  document.getElementById('modal').style.display='none';
  document.getElementById('hsub').textContent='演示模式 · 模拟数据';
  document.getElementById('llabel').textContent='DEMO';

  renderMission({
    title:'实现用户注册接口 POST /api/register',
    dev_steps:[
      {step_kind:'analyze',    assigned_to:'leader',   status:'succeeded'},
      {step_kind:'design',     assigned_to:'leader',   status:'succeeded'},
      {step_kind:'write_code', assigned_to:'coder',    status:'running'},
      {step_kind:'write_tests',assigned_to:'coder',    status:'queued'},
      {step_kind:'code_review',assigned_to:'reviewer', status:'queued'},
    ]
  });

  const msgs = [
    {t:400,  agent:'leader',   status:'working', message:'收到需求：用户注册接口。拆解任务——Coder 实现接口，Reviewer 负责安全审查。'},
    {t:1800, agent:'coder',    status:'working', message:'开始实现。技术栈：Flask + bcrypt。用户名3-20位，密码6位以上，重复用户名返回400。'},
    {t:3200, agent:'reviewer', status:'waiting', message:'收到，等待代码完成后开始审查。重点关注：密码存储、输入校验、错误信息不泄露细节。'},
    {t:5000, agent:'coder',    status:'working', message:'核心逻辑完成。bcrypt 哈希轮数设为12，支持重复用户名检测。'},
    {t:6800, agent:'coder',    status:'done',    message:'接口完成，本地测试通过。POST /api/register 正确返回 201，重复用户名返回 400。'},
    {t:8200, agent:'reviewer', status:'working', message:'开始审查。① 密码哈希 ✓  ② 输入验证 ✓  ③ 建议：错误信息统一为"注册失败"，防止用户枚举攻击。'},
    {t:9800, agent:'leader',   status:'done',    message:'审查意见已收到。Coder 按建议修改错误提示后，本次任务完成 ✓'},
  ];
  msgs.forEach(({t,agent,status,message})=>{
    setTimeout(()=>{
      addMsg({agent, created_at:new Date().toISOString(), payload:{message,status}});
      syncAgent({agent, payload:{message,status}});
    }, t);
  });

  const evs = [
    {t:200,  cls:'approved',  label:'提案通过审批', agent:'system'},
    {t:600,  cls:'running',   label:'任务开始执行', agent:'leader'},
    {t:2000, cls:'succeeded', label:'步骤完成 · analyze', agent:'leader'},
    {t:3500, cls:'running',   label:'开始编写代码', agent:'coder'},
    {t:7000, cls:'succeeded', label:'步骤完成 · write_code', agent:'coder'},
    {t:8500, cls:'running',   label:'开始代码审查', agent:'reviewer'},
  ];
  evs.forEach(({t,cls,label,agent})=>{
    setTimeout(()=>{ addEv({event_type:cls, agent, created_at:new Date().toISOString()}); }, t);
  });

  setTimeout(()=>{
    document.getElementById('progFill').style.width='40%';
    document.getElementById('progLabel').textContent='2 / 5 步骤完成';
    document.getElementById('progPct').textContent='40%';
  }, 2500);
}
</script>
</body>
</html>
